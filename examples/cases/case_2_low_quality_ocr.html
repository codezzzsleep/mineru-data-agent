<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Case 2 低质量 OCR 样例</title>
  </head>
  <body>
    <article>
      <h1>低质量扫描件 OCR 复核记录</h1>
      <p>报告日期：2026-05-18</p>
      <p>文档来源：车间安全巡检拍照件，存在轻微倾斜、局部反光、签章覆盖和手写批注。</p>
      <p>OCR 摘要：第 2 页温度记录可读，第 3 页签章区域存在锟斤拷样编码噪声，第 4 页边缘文字残缺。</p>
      <p>异常提示：设备 B-17 的温度记录出现 86.5 摄氏度，超过阈值 80 摄氏度，需要人工复核原图。</p>
      <p>处理建议：对低清晰度区域启用更高分辨率重扫或 VLM 复核，并把噪声行写入质量报告。</p>
      <h2>复核清单</h2>
      <ul>
        <li>检查页边裁切是否导致表格列名丢失。</li>
        <li>检查手写签章是否覆盖设备编号。</li>
        <li>检查异常温度数值是否来自同一行。</li>
      </ul>
    </article>
  </body>
</html>
