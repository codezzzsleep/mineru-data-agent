    <title>Case 5 网页巡检日报样例</title>
  </head>
  <body>
    <article>
      <h1>设备巡检日报</h1>
      <p>报告日期：2026-05-22</p>
      <p>巡检范围：产线 A、产线 B、仓储温控区和空压站。</p>
      <p>产线 A 今日完成 42 次巡检，发现 2 个需要复核的温度异常点。</p>
      <p>产线 B 今日完成 37 次巡检，未发现停机风险。</p>
      <h2>异常记录</h2>
      <table>
        <tr><th>设备</th><th>异常类型</th><th>数值</th><th>处理状态</th></tr>
        <tr><td>A-17 轴承</td><td>温度异常</td><td>86.5</td><td>待复核</td></tr>
        <tr><td>A-22 电机</td><td>振动异常</td><td>4.8</td><td>已派单</td></tr>
      </table>
      <p>处理建议：优先复查高温轴承，并将异常记录写入维护台账。</p>
    </article>
  </body>
