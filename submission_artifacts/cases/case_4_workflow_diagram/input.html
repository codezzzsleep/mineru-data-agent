<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Case 4 工艺流程解析样例</title>
  </head>
  <body>
    <article>
      <h1>锂电池涂布产线流程说明</h1>
      <p>报告日期：2026-05-20</p>
      <p>流程名称：正极浆料涂布与烘干流程</p>
      <figure>
        <figcaption>流程图说明：投料 -> 搅拌 -> 过滤 -> 涂布 -> 烘干 -> 收卷 -> 质检。</figcaption>
      </figure>
      <h2>关键步骤</h2>
      <ol>
        <li>投料阶段核对批次号和固含量。</li>
        <li>搅拌阶段记录转速 1,200 rpm 和温度 25 摄氏度。</li>
        <li>涂布阶段监控厚度 118 微米，允许偏差 3 微米。</li>
        <li>烘干阶段检查温区 1 到温区 4 的温度曲线。</li>
      </ol>
      <p>异常提示：若温区 3 连续 5 分钟超过 92 摄氏度，需暂停收卷并复核传感器。</p>
      <p>处理建议：Agent 应抽取步骤顺序、关键参数、异常节点和待视觉模型复核的图像说明。</p>
    </article>
  </body>
</html>
