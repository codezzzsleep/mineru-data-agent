name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: CLI smoke
        run: |
          data-agent --help
          data-agent run --input examples/cases/case_1_financial_report.html --out runs/ci_cli_smoke --task "抽取财报关键字段并输出结构化结果" --profile auto
          data-agent batch --manifest examples/batch_manifest.json --out runs/ci_batch_smoke
          data-agent agent-run --help
      - name: Build submission zip
        shell: pwsh
        run: ./scripts/make_submission_zip.ps1 -Output "dist/mineru-data-agent-submission.zip"
      - name: Validate submission zip
        run: SUBMISSION_ZIP_PATH=dist/mineru-data-agent-submission.zip pytest -q tests/test_submission_zip_inventory.py
