name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: API performance smoke
        run: >
          python scripts/run_api_load_smoke.py
          --requests 6
          --concurrency 3
          --output-dir runs/ci_api_load_smoke
          --min-success-rate 1.0
          --min-artifact-complete-rate 1.0
          --max-p95-seconds 5.0
